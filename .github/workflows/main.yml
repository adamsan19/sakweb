 # GitHub Actions workflow to fetch video data and optionally deploy to Cloudflare Pages
#
# This workflow runs on a schedule (daily by default) and can also be
# triggered manually. It checks out the repository, sets up Python,
# installs required packages, runs the `sedot.py` script in synchronous
# mode, commits any changed static data files under `public/data`, and
# pushes them back to the repository.
#
# If you prefer to combine this with a Cloudflare Pages deployment, you
# can extend the job with additional steps (see comments below).

name: Daily fetch & commit

# ensure the GITHUB_TOKEN has write access to repository contents
permissions:
  contents: write

on:
  schedule:
    # change the cron expression to whatever frequency you need
    - cron: '0 3 * * *'      # every day at 03:00 UTC
  workflow_dispatch:         # allows manual triggering from the Actions tab

jobs:
  fetch:
    name: Fetch and commit data
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # we need full history for committing
          persist-credentials: true  # keep GITHUB_TOKEN for git push

      - name: Set up Python 3.x
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp

      - name: Run fetch script
        # ``--sync`` forces synchronous mode so that the action can wait
        # for completion and we have a JSON result if desired.
        run: python sedot.py --sync

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data || true
          # only commit if there are changes
          if ! git diff --cached --exit-code; then
            git commit -m "chore: automatic data update by GitHub Actions"
            # push back to the same branch that triggered the workflow
            git push origin HEAD:${{ github.ref }}
          else
            echo "No changes to commit"
          fi

      # Optional: deploy to Cloudflare Pages using wrangler
      # Uncomment and configure the following steps if you want the
      # workflow to push the new data to Pages automatically. Make sure
      # you have set the CF_API_TOKEN secret in your repository.
      #
      # - name: Install wrangler
      #   run: npm install -g wrangler
      #
      # - name: Deploy to Cloudflare Pages
      #   env:
      #     CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      #   run: |
      #     wrangler pages deploy ./public --branch=${{ github.ref }}
