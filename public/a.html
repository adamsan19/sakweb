            border-radius: 6px;

            color: #e5e5e5;
            border: 1px solid #333;

        .title-hidden {

        #custom-player {

</head>

        ];

        function getRandomAdditionalContent() {
            const randomIndex = Math.floor(Math.random() * additionalContent.length);
            return additionalContent[randomIndex];
        }

        document.getElementById('searchButton').addEventListener('click', function () {
            const searchTerm = document.getElementById('searchTerm').value;
            const url = `https://scrapy-01q.pages.dev/api/search?q=${encodeURIComponent(searchTerm)}`;

            fetch(url)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok ' + response.statusText);
                    }
                    return response.json();
                })
                .then(data => {
                    const searchTerm = document.getElementById('searchTerm').value;
                    const sortedResults = sortResultsByRelevance(data.result, searchTerm);
                    displayResults(sortedResults, searchTerm);
                })
                .catch(error => {
                    console.error('There was a problem with the fetch operation:', error);
                    document.getElementById('result').value = 'Terjadi kesalahan saat mengambil data.';
                });
        });

        document.getElementById('listButton').addEventListener('click', function () {
            // Generate random page number antara 1-539
            const randomPage = Math.floor(Math.random() * 539) + 1;
            const url = `https://full-apis.pages.dev/api/list?page=${randomPage}`;

            fetch(url)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok ' + response.statusText);
                    }
                    return response.json();
                })
                .then(data => {
                    if (data.result && data.result.files) {
                        const searchTerm = ''; // Untuk list semua, tidak ada kata kunci
                        displayResults(data.result.files, searchTerm);
                    } else {
                        document.getElementById('result').value = 'Tidak ada hasil ditemukan.';
                    }
                })
                .catch(error => {
                    console.error('There was a problem with the fetch operation:', error);
                    document.getElementById('result').value = 'Terjadi kesalahan saat mengambil data.';
                });
        });

        document.getElementById('saveButton').addEventListener('click', function () {
            const searchTerm = document.getElementById('searchTerm').value;
            const blob = new Blob([searchTerm], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'kata_kunci.txt';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url); // Bebaskan URL setelah digunakan
        });

        document.getElementById('toggleTitleButton').addEventListener('click', function () {
            titlesVisible = !titlesVisible;
            const titleElements = document.querySelectorAll('.result-title');
            const button = document.getElementById('toggleTitleButton');

            titleElements.forEach(element => {
                if (titlesVisible) {
                    element.classList.remove('title-hidden');
                } else {
                    element.classList.add('title-hidden');
                }
            });

            button.textContent = titlesVisible ? 'Sembunyikan Title' : 'Tampilkan Title';
        });

        function cleanTitle(title) {
            const forbiddenWords = ['bokep', 'memek', 'Update', 'ngentot', 'ngewe', 'colmek', 'pepek', 'muncrat', 'kontol', 'jilmek', 'perkosa'];
            let cleanedTitle = title;

            forbiddenWords.forEach(word => {
                const regex = new RegExp(`\\b${word}\\b`, 'gi');
                cleanedTitle = cleanedTitle.replace(regex, '');
            });

            const words = cleanedTitle.trim().split(/\s+/);
            const maxWords = 3;
            let result = [];

            for (let i = 0; i < words.length; i++) {
                if (result.length < maxWords) {
                    result.push(words[i]);
                } else {
                    if (i < words.length - 1 && (words[i] === 'dan' || words[i] === 'atau' || words[i] === 'serta')) {
                        result.push(words[i]);
                        break;
                    }
                    break;
                }
            }

            return result.join(' ');
        }

        function getRandomTitle() {
            const customTitlesInput = document.getElementById('customRandomTitles').value;
            const customTitles = customTitlesInput.split(',').map(title => title.trim()).filter(title => title);
            const titlesToUse = customTitles.length > 0 ? customTitles : defaultRandomTitles;
            const randomIndex = Math.floor(Math.random() * titlesToUse.length);
            return titlesToUse[randomIndex];
        }

        function getNextDomain() {
            const customDomainInput = document.getElementById('customDomain').value;
            const domains = customDomainInput.split(',').map(domain => domain.trim()).filter(domain => domain);
            if (domains.length === 0) return 'doodi.pages.dev'; // Default domain jika tidak ada input
            const domain = domains[currentDomainIndex];
            currentDomainIndex = (currentDomainIndex + 1) % domains.length; // Update indeks untuk domain berikutnya
            return domain;
        }

        function calculateRelevanceScore(result, searchTerm) {
            if (!searchTerm || !result.title) return 0;

            const searchWords = searchTerm.toLowerCase().split(/\s+/).filter(word => word.length > 0);
            const title = result.title.toLowerCase();
            let score = 0;

            // Hitung skor berdasarkan kemunculan kata kunci
            searchWords.forEach(word => {
                // Exact match di awal judul (skor tertinggi)
                if (title.startsWith(word)) {
                    score += 100;
                }
                // Exact match di tengah judul
                else if (title.includes(' ' + word + ' ')) {
                    score += 50;
                }
                // Partial match (kata kunci muncul sebagai substring)
                else if (title.includes(word)) {
                    score += 25;
                }

                // Bonus jika semua kata kunci ada
                const wordCount = searchWords.filter(w => title.includes(w)).length;
                if (wordCount === searchWords.length) {
                    score += 30;
                }
            });

            // Bonus untuk judul yang lebih pendek (lebih relevan)
            if (title.length < 50) {
                score += 10;
            }

            return score;
        }

        function sortResultsByRelevance(results, searchTerm) {
            if (!searchTerm || !results || results.length === 0) return results;

            // Buat salinan array dan tambahkan skor relevansi
            const resultsWithScore = results.map(result => ({
                ...result,
                relevanceScore: calculateRelevanceScore(result, searchTerm)
            }));

            // Urutkan berdasarkan skor (tertinggi ke terendah)
            return resultsWithScore.sort((a, b) => b.relevanceScore - a.relevanceScore);
        }

        function formatLink(link) {
            // Pastikan link memiliki http:// atau https://
            if (!link.startsWith('http://') && !link.startsWith('https://')) {
                return `https://${link}`;
            }
            return link;
        }

        function displayResults(results, searchTerm = '') {
            const resultTextarea = document.getElementById('result');
            let output = '';

            if (results && results.length > 0) {
                results.forEach((result, index) => {
                    const cleanedTitle = cleanTitle(result.title);
                    const randomTitle = getRandomTitle();
                    const link = formatLink(`${getNextDomain()}/e/${result.file_code}`); // Menggunakan domain yang diperoleh

                    if (titlesVisible) {
                        output += `${cleanedTitle}  ${randomTitle}\n${link}\n\n`;
                    } else {
                        output += `${link}\n\n`;
                    }

                    // Sisipkan konten tambahan setelah setiap 1 result
                    const additional = getRandomAdditionalContent();
                    const additionalLink = formatLink(additional.link);
                    output += `${additional.title}\n${additionalLink}\n\n`;
                });
            } else {
                output = 'Tidak ada hasil ditemukan.';
            }

            resultTextarea.value = output;
        }

        // ====== TAMBAHAN: tekan Enter di input akan jalankan pencarian ======
        const searchInput = document.getElementById('searchTerm');
        searchInput.addEventListener('keydown', function (event) {
            if (event.key === 'Enter') {
                event.preventDefault(); // cegah submit form default kalau nanti pakai form
                document.getElementById('searchButton').click();
            }
        });
